<body class="bg-gradient-scout">

    <div class="scout-watermark scout-watermark-2">⚜</div>

    <nav class="fixed top-0 w-full z-50 backdrop-blur-md bg-white/5 border-b border-white/10 py-4 px-4 md:px-6">
        <div class="max-w-7xl mx-auto flex justify-center w-full">
            <div class="flex justify-center items-center gap-4 md:gap-8 text-white text-sm md:text-base font-medium w-full">
                <a href="index.html" class="nav-link">Home</a>

            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                
                <div class="lomba-card glass-card rounded-3xl overflow-hidden scroll-animate stagger-1">
                    <div class="h-40 bg-amber-600/30 flex items-center justify-center relative overflow-hidden">
                        <span class="text-7xl opacity-20 absolute -right-4 -bottom-4">💂</span>

                    <div class="p-6">

                <div class="lomba-card glass-card rounded-3xl overflow-hidden scroll-animate stagger-2">
                    <div class="h-40 bg-blue-600/30 flex items-center justify-center relative overflow-hidden">

                    </div>
                    <div class="p-6">
                        <h3 class="text-xl font-bold text-white">SI</h3>
                    </div>
                </div>

    </footer>

    <script>
        // Intersection Observer logic
        const observerOptions = { threshold: 0.1 };
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('animated');
                }
            });
        }, observerOptions);

        document.querySelectorAll('.scroll-animate, .scroll-animate-scale, .scroll-animate-fade').forEach(el => {
            observer.observe(el);
        });
    </script>
