<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kotak Saran Gebyar Sincan 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <style>
        .success-notification { display: none; position: fixed; top: 20px; right: 20px; z-index: 1000; }
        .success-notification.show { display: block; }
    </style>
</head>
<body class="bg-gradient-scout">
    <div class="scout-watermark scout-watermark-1">⚜</div>
    <div class="scout-watermark scout-watermark-2">⚜</div>
    <div class="scout-watermark scout-watermark-3">⚜</div>

    <nav class="relative z-20 backdrop-blur-md bg-white/5 border-b border-white/10 py-4 px-4 md:px-6 w-full">
        <div class="max-w-7xl mx-auto flex justify-center">
            <div class="flex justify-center items-center gap-4 md:gap-8 text-white text-sm md:text-base font-medium w-full">
                <a href="#" class="nav-link text-amber-400">Home</a>
                <a href="lomba.html" class="nav-link">Lomba</a>
                <a href="https://drive.google.com/file/d/1-Ut0XHy7AjcVjMd-NeAfK5FCv9wQl7ry/view?usp=sharing" target="_blank" class="nav-link">Juklak</a>
                <a href="kontak.html" class="nav-link">Kontak</a>
            </div>
        </div>
    </nav>

    <div id="successNotification" class="success-notification">
        <div class="bg-green-600 text-white rounded-2xl p-6 shadow-2xl text-center">
            <div class="text-4xl mb-2">✅</div>
            <h3 class="text-xl font-bold">Terima Kasih!</h3>
            <p>Saran berhasil dikirim.</p>
        </div>
    </div>

    <div class="relative z-10 min-h-screen flex items-center justify-center p-4">
        <div class="bg-white/10 backdrop-blur-lg rounded-3xl p-8 w-full max-w-4xl border border-white/20">
            <div class="text-center mb-10">
                <h1 class="text-5xl md:text-7xl font-extrabold text-white mb-4">Gebyar Sincan 2026</h1>
                <h2 class="text-2xl font-bold text-amber-400">Kotak Saran</h2>
            </div>

            <form action="https://script.google.com/macros/s/AKfycbzzT9A1A4K19Q7tLgQy_fXjR3pI_3X33yQ-zG4_q-R7sK9O-mO5X5Y6v1b1w0T0V4qL/exec" method="POST" id="saranForm" class="space-y-6">
                <div class="space-y-3">
                    <label class="block text-white font-bold text-lg">Saran & Kritik <span class="text-red-400">*</span></label>
                    <textarea name="saran_kritik" required rows="8" class="w-full p-4 rounded-xl bg-white/5 border border-white/10 text-white focus:ring-2 focus:ring-amber-500 outline-none resize-none" placeholder="Tuliskan saran Anda di sini..."></textarea>
                </div>
                <button type="submit" id="submitBtn" class="w-full bg-amber-500 hover:bg-amber-600 text-white font-bold py-4 rounded-xl text-lg transition-all">
                    <span id="btnText">Kirim Saran</span>
                </button>
            </form>
        </div>
    </div>

    <script>
        const form = document.getElementById('saranForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const successNotification = document.getElementById('successNotification');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            submitBtn.disabled = true;
            btnText.innerText = "Mengirim...";

            fetch(form.action, {
                method: 'POST',
                body: new FormData(form),
                mode: 'no-cors' // Mode ini memastikan Google tidak memblokir pengiriman
            }).then(() => {
                successNotification.classList.add('show');
                form.reset();
                submitBtn.disabled = false;
                btnText.innerText = "Kirim Saran";
                setTimeout(() => successNotification.classList.remove('show'), 5000);
            }).catch(err => {
                alert("Gagal. Pastikan internet stabil.");
                submitBtn.disabled = false;
                btnText.innerText = "Kirim Saran";
            });
        });
    </script>
</body>
</html>
