<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kotak Saran Gebyar Sincan 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body class="bg-gradient-scout">
    <div class="scout-watermark scout-watermark-1">⚜</div>
    <div class="scout-watermark scout-watermark-2">⚜</div>
    <div class="scout-watermark scout-watermark-3">⚜</div>

    <nav class="relative z-20 backdrop-blur-md bg-white/5 border-b border-white/10 py-4 px-4 md:px-6 w-full">
        <div class="max-w-7xl mx-auto flex justify-center">
            <div class="flex justify-center items-center gap-4 md:gap-8 text-white text-sm md:text-base font-medium w-full">
                <a href="#" class="nav-link text-amber-400">Home</a>
                <a href="lomba.html" class="nav-link">Lomba</a>
                <a href="https://drive.google.com/file/d/1-Ut0XHy7AjcVjMd-NeAfK5FCv9wQl7ry/view?usp=sharing" target="_blank" class="nav-link">Juklak</a>
                <a href="kontak.html" class="nav-link">Kontak</a>
            </div>
        </div>
    </nav>

    <div id="successNotification" class="success-notification">
        <div class="glass-card rounded-2xl p-8 max-w-md mx-auto text-center">
            <div class="text-6xl mb-4">✅</div>
            <h3 class="text-2xl font-bold text-white mb-2">Terima Kasih!</h3>
            <p class="text-white/90">Saran Anda telah berhasil masuk ke database panitia.</p>
        </div>
    </div>

    <div class="relative z-10 min-h-screen flex items-center justify-center p-4 py-8 md:py-12">
        <div class="glass-card rounded-3xl p-6 md:p-10 lg:p-12 w-full max-w-4xl">
            <div class="text-center mb-10">
                <h1 class="text-6xl md:text-8xl font-extrabold mb-4 title-gradient glow-effect title-pulse scroll-animate-scale">Gebyar Sincan 2026</h1>
                <h2 class="text-2xl md:text-3xl font-bold text-white mt-4 mb-3">Kotak Saran</h2>
                <div class="flex items-center justify-center gap-2 mb-4">
                    <div class="h-px w-16 bg-gradient-to-r from-transparent to-amber-500"></div>
                    <span class="text-amber-400 text-2xl">⚜</span>
                    <div class="h-px w-16 bg-gradient-to-l from-transparent to-amber-500"></div>
                </div>
            </div>

            <div id="alreadySubmitted" class="hidden text-center py-8">
                <div class="text-6xl mb-4">📬</div>
                <h3 class="text-2xl font-bold text-white mb-2">Saran Sudah Terkirim</h3>
            </div>

            <form action="https://script.google.com/macros/s/AKfycbxbuHXDNy1dNWD0ifHR8G2LvH0UT2uP2cPVwkQnWGvA1r_JyOj9ho_qAyIkk4WF0Pqo/exec" method="POST" id="saranForm" class="space-y-7">
                <div class="space-y-3">
                    <label class="block text-white font-bold text-base md:text-lg">Saran & Kritik <span class="text-red-400">*</span></label>
                    <textarea name="saran_kritik" required rows="8" class="w-full p-4 rounded-xl bg-white/10 border border-white/20 text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-amber-500 resize-none" placeholder="Tuliskan saran Anda di sini..."></textarea>
                </div>
                <div class="pt-6">
                    <button type="submit" id="submitBtn" class="btn-submit w-full text-white font-bold py-4 px-6 rounded-xl text-lg md:text-xl flex items-center justify-center gap-3">
                        <span id="btnText">Kirim Saran</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const form = document.getElementById('saranForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const successNotification = document.getElementById('successNotification');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            submitBtn.disabled = true;
            btnText.innerText = "Mengirim...";

            fetch(form.action, {
                method: 'POST',
                body: new FormData(form),
                mode: 'no-cors'
            }).then(() => {
                successNotification.classList.add('show');
                form.reset();
                submitBtn.disabled = false;
                btnText.innerText = "Kirim Saran";
                setTimeout(() => successNotification.classList.remove('show'), 5000);
            }).catch(err => {
                alert("Gagal. Pastikan koneksi internet stabil.");
                submitBtn.disabled = false;
                btnText.innerText = "Kirim Saran";
            });
        });
    </script>
</body>
</html>
